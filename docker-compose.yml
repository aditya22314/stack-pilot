version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stackpilot-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stackpilot
    ports:
      - '5432:5432'
    volumes:
      - stackpilot-db-data:/var/lib/postgresql/data

volumes:
  stackpilot-db-data:
